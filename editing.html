<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editing</title>
    <link rel="stylesheet" href="editing.css">
</head>
<body>
    <div class="parent">
        <div class="div1"></div>
        <div class="div2"></div>
        <div class="div3">
            <a href="index.html"><h1>Voltify</h1></a>
        </div>
        <div class="div4">
            <img src="C:/Users/User/Downloads/data-management.png" alt="">
        </div>
        <div class="div5">
            <input type="text" placeholder="Пошук">
            <button>Знайти</button>
        </div>
        <div class="div6">
            <img class='entrens' src="image copy 3.png" alt="">
            <img class='entrens' src="image copy 4.png" alt="">
        </div>
        <div class="div7">
            <h2>Редагування</h2>
            <img src="https://via.placeholder.com/50" id="preview-small" alt="mini">

                <input type="file" id="edit-image-file" hidden> 
            </label>

            <input type="number" placeholder="Гарантія">
            <input type="number" placeholder="Рік випуску">
            <label>Бренд</label>
            <select id="edit-category">
                <option>Монітор</option>
                <option>Ноутбук</option>
                <option>ПК</option>
                <option>Мишка</option>
                <option>Навушники</option>
                <option>Підставка</option>
            </select>
            <label>Ціна</label>
            <input type="text" id="edit-price">
            <label>Кількість</label>
            <input type="number">
            <button class="save">Зберегти</button>
            <button class="delete">Скасувати</button>
        </div>
        <div class="div8">
            <h2>Приклад товару</h2>
            <a href="goods.html"></a><img src="placeholder.png" id="preview-img" alt="Product">
            <a href="goods.html"><h2 id="preview-name">Назва пристрою</h2></a>
            <p>Гарантія: 0 рік</p> <p>Рік: 2025</p>         
            <p id="preview-price">$0</p>
            <p id="counting"></p>
            <p id="edit-category"></p>
        </div>
    </div>
    <script src="editing.js"></script>
</body>
</html>
