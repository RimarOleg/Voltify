<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voltify - Товар</title>
    <link rel="stylesheet" href="goods.css">
</head>
<body>
    <div class="parent">
        <div class="div1 logo-area">
            <h1>Voltify</h1>
        </div>
        
        <div class="div2 icons-area">
            <div class="icons">
                <span>👤</span>
                <span>🛒</span>
                <span>⚙️</span>
            </div>
        </div>

        <div class="div3 main-content">
            
            <div class="info-section">
                <h2>Інформація про товар</h2>
                <div class="form-grid">
                    <div class="label">Назва пристрою</div> <div class="input"></div>
                    <div class="label">Гарантія</div> <div class="input"></div>
                    <div class="label">Рік випуску</div> <div class="input"></div>
                    <div class="label">Бренд</div> <div class="input"></div>
                    <div class="label">Ціна</div> <div class="input"></div>
                    <div class="label">Кількість</div> <div class="input"></div>
                </div>
            </div>

            <div class="preview-section">
                <h2>Приклад товару</h2>
                <div class="product-card">
                    <div class="image-box">
                        <img src="acer_nitro.png" alt="Acer Nitro">
                    </div>
                    <div class="tags-grid">
                        <div class="tag">Рік: 2025</div>
                        <div class="tag">Гарантія: 1 рік</div>
                        <div class="tag">Кількість: 15</div>
                        <div class="tag">Ціна: $1,299</div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
